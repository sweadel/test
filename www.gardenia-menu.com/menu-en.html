                                    <div class="productImage" style="width:200px;height:200px;background-image:url('{{image}}');background-size:cover;border-radius:8px;" data-imgwidth="500"></div>

                            </div>

                <span style="font-size:25px;"></span>
            </a>
            <div id="InteractionsBtn" class="interactionsBtn" style="background-color:#000000;color:#ffffff;font-family:&#39;TekoBold&#39;;">
                <i id="AttendantIcon" class="icons icon-bell" style="display:none;"></i>
                <i id="BillIcon" class="icons icon-credit-card" style="display:none;"></i>
                <i id="FeedbackIcon" class="icons icon-emotsmile" style="display:none;"></i>
            </div>
            <h2>____</h2>
